name: CoffeeStory
options:
  bundleIdPrefix: com.coffestory
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGNING_REQUIRED: "YES"
    CODE_SIGNING_ALLOWED: "YES"
    CODE_SIGN_STYLE: "Automatic"
    DEVELOPMENT_TEAM: "96UBFN3CKV"
    GENERATE_INFOPLIST_FILE: "YES"
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "9"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CoffeeStory:
    type: application
    platform: iOS
    sources:
      - path: CoffeeStory
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.coffestory.coffeestory
        PRODUCT_NAME: CoffeeStory
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: coffeestory
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait, UIInterfaceOrientationPortraitUpsideDown, UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
        INFOPLIST_KEY_NSCameraUsageDescription: "用于拍摄豆袋照片作为封面。"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "用于选择豆袋照片作为封面。"
schemes:
  CoffeeStory:
    build:
      targets:
        CoffeeStory: all
    run:
      config: Debug
      storeKitConfiguration: CoffeeStory/Store/Products.storekit
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
